  # - input : Filebeat로부터 5044 포트로 데이터 수신
  # - filter: JSON 파싱 → timestamp 정규화 → 불필요 필드 제거
  # - output: ES에 fastapi-logs-날짜 형식으로 인덱스 저장

input {
  beats { 
    port => 5044 # Filebeat로부터 5044 포트로 수신
    enrich => []  # event.original 생성 비활성화
  }
}

filter {
  # 1. 메시지가 '{'로 시작하는 경우 (JSON 로그 후보)
  if [message] =~ /^\{.*/ { 
    json {
      source => "message" # JSON 문자열 → 필드로 파싱
      # JSON 파싱 실패 시 '_jsonparsefailure' 태그가 자동으로 붙는다.
    }

    # 유효하지 않은 JSON 형식인 경우 처리 방지 및 삭제
    if "_jsonparsefailure" in [tags] {
      drop { }
    }
    # JSON 파싱이 성공했다면 시간대 변환 및 다양한 형식 대응
    date {
      # 밀리초 포함 포맷 및 ISO8601 표준 대응
      match => [ "timestamp", "yyyy-MM-dd'T'HH:mm:ss.SSS", "yyyy-MM-dd'T'HH:mm:ss", "ISO8601" ]
      target => "@timestamp"
      # 한국 시간(KST) 기준으로 변환하여 Kibana 조회 편의성 증대
      timezone => "Asia/Seoul"
    }

    # 불필요한 메타데이터 필드 정리
    mutate {
      remove_field => ["message", "timestamp", "agent", 
                       "ecs", "input", "log", "host"]
    }
  } 
  # 2. JSON이 아닌 경우 -> 아예 삭제 (drop)
  else {
    drop { }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "fastapi-logs-%{+YYYY.MM.dd}" # 날짜별 인덱스 자동 생성
  }
  
  # 데이터가 잘 들어오는지 터미널에서 확인 (디버깅용)
  # 운영 환경(Production) 배포 시에는 반드시 삭제
  stdout { 
    codec => rubydebug
  }
}